# Use zsh as default
set -g default-shell /bin/zsh

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# General
set -g set-clipboard on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g mouse on
set -g status-interval 3
set -g allow-passthrough on
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
bind-key -n S-Enter send-keys Escape "\[13;2u"
bind-key -n S-Space send-keys Space

# Prefix: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Refresh tmux config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split horizontally in CWD with \
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Use vim arrow keys to resize
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Enable emacs mode for copy mode
set-window-option -g mode-keys emacs

# Start selecting text with "v"
bind-key -T copy-mode 'v' send -X begin-selection

# Copy text with "y" or Enter
bind -T copy-mode 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste yanked text with "Prefix + P"
bind P paste-buffer

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode MouseDragEnd1Pane

# Scroll speed (3 lines per tick — smooth for trackpad, responsive for mouse)
bind -T copy-mode WheelUpPane send-keys -X -N 3 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Search keybindings with fzf
bind / display-popup -E "cat ~/.config/tmux/tmux-cheatsheet | fzf --prompt='tmux> '"

# Lazygit popup in current directory
bind g display-popup -d '#{pane_current_path}' -w 90% -h 90% -E "DELTA_FEATURES=+default lazygit"

# Pane process manager: list panes, kill or jump
bind a display-popup -E -w 80% -h 70% "bash ~/.config/tmux/tmux-pane-manager.sh" \; \
  if-shell "test -f /tmp/.tmux-pane-manager-jump" \
    "source-file /tmp/.tmux-pane-manager-jump ; run-shell 'rm -f /tmp/.tmux-pane-manager-jump'"

# Terminal popup in current directory
bind T display-popup -d '#{pane_current_path}' -w 60% -h 60%

# Info popup: directory + git summary
bind i display-popup -d '#{pane_current_path}' -w 60 -h 20 -E "bash ~/.config/tmux/tmux-info.sh"

# Agent monitor: Claude Code agent dashboard
bind A display-popup -E -w 90% -h 80% "~/.local/bin/claude-dashboard" \; \
  if-shell "test -f /tmp/.claude-dashboard-jump" \
    "source-file /tmp/.claude-dashboard-jump ; run-shell 'rm -f /tmp/.claude-dashboard-jump'"

# Agent monitor: highlight windows with idle agents
set -g monitor-silence 30
set -g silence-action other
set -g visual-silence off
set -g monitor-activity on
set -g activity-action other
set -g visual-activity off
set-window-option -g window-status-activity-style "dim"
set-window-option -g window-status-bell-style "dim"

# tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'

# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position bottom
set -g status-justify centre
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=${gray_dark}"
set -g status-left "#{?client_prefix,#[fg=yellow bold],#[fg=${green_soft} bold]} #S #[fg=${gray_light} nobold] | "
set -g status-right " %H:%M  ⚙ #{cpu}  ☰ #{mem} "
set -g window-status-current-format "#[fg=${gray_dark},bg=${cyan_soft},bold]  #I:#W#{?window_zoomed_flag, 󰍋,}  #[default]"
set -g window-status-format "#[fg=${gray_light},bg=#4C566A]  #I:#W  #[default]"
set -g window-status-separator "  "
set -g message-style "fg=${gray_light},bg=${gray_dark}"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

# Resurrect
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
