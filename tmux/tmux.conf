# True-color (24-bit) and 256-color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Prefix: Ctrl+a and Ctrl+Space
unbind C-b
set -g prefix C-a
set -g prefix2 C-Space
bind C-a send-prefix

# Refresh config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Split horizontally in CWD with \
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Resize with vim keys (repeatable)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Mouse (scroll, click, resize)
set -g mouse on

# Better copy: drag to select, Enter or y to copy to clipboard, Escape to cancel
unbind -T copy-mode MouseDragEnd1Pane
bind -T copy-mode Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode y send-keys -X copy-pipe-and-cancel "pbcopy"

# Reducir lag de escape (default 500ms)
set -sg escape-time 0

# Más historial de scroll (default 2000)
set -g history-limit 50000

# Scroll suave en trackpad (2 líneas por tick en vez de 5)
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Ventanas y paneles empiezan desde 1
set -g base-index 1
setw -g pane-base-index 1

# Buscar keybindings con fzf (cheatsheet legible)
bind / display-popup -E "cat ~/.config/tmux/tmux-cheatsheet | fzf --prompt='tmux> '"

